name: Generate Template Manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - template-manifest.json

permissions:
  contents: write

jobs:
  generate-template-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate manifest
        run: node scripts/generate-template-manifest.mjs

      - name: Commit updated manifest
        run: |
          if [ -z "$(git status --short -- template-manifest.json)" ]; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add template-manifest.json
          
          # Commit the changes; if it fails (e.g., race condition), exit gracefully
          git commit -m "chore: update template manifest" || exit 0
          
          # Pull latest changes before pushing to avoid fast-forward rejection
          git pull --rebase origin main || true
          
          # Push the changes
          git push || exit 1
