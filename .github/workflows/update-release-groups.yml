name: Update Release Groups

on:
  schedule:
    - cron: '13 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-release-groups:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run updater
        run: python scripts/update_release_groups.py

      - name: Run updater tests
        run: python -m unittest discover -s tests

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --short -- Other/fusion-tags-ume.json)" ]; then
            echo "No release-group updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Other/fusion-tags-ume.json
          git commit -m "chore: sync release-group tags"
          git push
