name: Update Release Groups

on:
  schedule:
    - cron: '13 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-release-groups:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Resolve latest omni template
        run: |
          latest_template="$(
            python3 - <<'PY'
from pathlib import Path
import re

pattern = re.compile(r"^ume-omni-template-v(\d+(?:\.\d+)*)\.json$")
candidates = []
for path in Path(".").glob("ume-omni-template-v*.json"):
    match = pattern.match(path.name)
    if not match:
        continue
    version = tuple(int(part) for part in match.group(1).split("."))
    candidates.append((version, path.as_posix()))

if not candidates:
    raise SystemExit("No ume-omni-template-v*.json files found.")

print(max(candidates, key=lambda item: item[0])[1])
PY
          )"
          echo "OMNI_TEMPLATE_FILE=$latest_template" >> "$GITHUB_ENV"
          echo "Using template: $latest_template"

      - name: Run updater tests
        run: python3 -m unittest discover -s tests -t .

      - name: Run updater
        run: python3 scripts/update_release_groups.py

      - name: Run updater (colored variant)
        run: python3 scripts/update_release_groups.py --target-file Other/fusion-tags-ume-colored.json

      - name: Run updater (minimalistic variant)
        run: python3 scripts/update_release_groups.py --target-file Other/fusion-tags-ume-minimalistic.json

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --short -- Other/fusion-tags-ume.json Other/fusion-tags-ume-colored.json Other/fusion-tags-ume-minimalistic.json)" ]; then
            echo "No release-group updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Other/fusion-tags-ume.json Other/fusion-tags-ume-colored.json Other/fusion-tags-ume-minimalistic.json
          git commit -m "chore: sync release-group tags"
          git push
