name: Update Private Synced ESE

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-private-synced-ese:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run updater tests
        run: python3 -m unittest discover -s tests -t .

      - name: Sync private ESE rules
        run: python3 scripts/sync_private_synced_ese.py

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --short -- Other/private-synced-ese.json)" ]; then
            echo "No private ESE updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Other/private-synced-ese.json
          git commit -m "chore: sync private ESE rules"
          git push
