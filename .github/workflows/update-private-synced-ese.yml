name: Update Private Synced ESE

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-private-synced-ese:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Resolve latest omni template
        run: |
          latest_template="$(
            python3 -c "import pathlib,re; c=[(tuple(map(int,m.group(1).split('.'))),p.as_posix()) for p in pathlib.Path('.').glob('ume-omni-template-v*.json') if (m:=re.match(r'^ume-omni-template-v(\\d+(?:\\.\\d+)*)\\.json$', p.name))]; print(max(c, key=lambda x: x[0])[1] if c else '')"
          )"
          if [ -z "$latest_template" ]; then
            echo "No ume-omni-template-v*.json files found."
            exit 1
          fi
          echo "OMNI_TEMPLATE_FILE=$latest_template" >> "$GITHUB_ENV"
          echo "Using template: $latest_template"

      - name: Run updater tests
        run: python3 -m unittest discover -s tests -t .

      - name: Sync private ESE rules
        run: python3 scripts/sync_private_synced_ese.py

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --short -- Other/private-synced-ese.json)" ]; then
            echo "No private ESE updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Other/private-synced-ese.json
          git commit -m "chore: sync private ESE rules"
          git push
